version: '3'

vars:
  BINARY: envoyage
  MAIN: ./cmd/envoyage
  VERSION: 0.5.0

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  fmt:
    desc: Format Go sources
    cmds:
      - gofmt -w cmd internal test

  tidy:
    desc: Tidy Go module dependencies
    cmds:
      - go mod tidy

  test:
    desc: Run all tests
    cmds:
      - go test ./...

  test:e2e:
    desc: Run fake-runtime end-to-end tests
    cmds:
      - go test ./test/e2e

  version:
    desc: Print the current project version
    cmds:
      - |
        awk '/^  VERSION:/ { print $2; exit }' Taskfile.yml

  version:bump:
    desc: Bump VERSION to the next patch version, or validate VERSION=x.y.z as the next patch/minor/major
    cmds:
      - |
        set -eu
        current="$(awk '/^  VERSION:/ { print $2; exit }' Taskfile.yml)"
        requested="${VERSION:-}"
        if [ -z "$requested" ]; then
          requested="$(awk -F. -v v="$current" 'BEGIN { split(v, p, "."); printf "%d.%d.%d", p[1], p[2], p[3] + 1 }')"
        fi

        if ! printf '%s\n' "$current" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "invalid current VERSION: $current" >&2
          exit 1
        fi
        if ! printf '%s\n' "$requested" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "invalid VERSION: $requested" >&2
          exit 1
        fi

        old_major="${current%%.*}"
        rest="${current#*.}"
        old_minor="${rest%%.*}"
        old_patch="${rest#*.}"

        new_major="${requested%%.*}"
        rest="${requested#*.}"
        new_minor="${rest%%.*}"
        new_patch="${rest#*.}"

        patch_next="$old_major.$old_minor.$((old_patch + 1))"
        minor_next="$old_major.$((old_minor + 1)).0"
        major_next="$((old_major + 1)).0.0"
        if [ "$requested" != "$patch_next" ] && [ "$requested" != "$minor_next" ] && [ "$requested" != "$major_next" ]; then
          echo "invalid VERSION bump: $current -> $requested" >&2
          echo "allowed: $patch_next, $minor_next, $major_next" >&2
          exit 1
        fi

        sed -i \
          -e "s/VERSION: $current/VERSION: $requested/" \
          -e "s/version                  = \"$current\"/version                  = \"$requested\"/" \
          -e "s/envoyage $current/envoyage $requested/g" \
          -e "s/want envoyage $current/want envoyage $requested/g" \
          -e "s/The current Envoyage version is \`$current\`./The current Envoyage version is \`$requested\`./" \
          -e "s/v$current/v$requested/g" \
          Taskfile.yml cmd/envoyage/main.go cmd/envoyage/main_test.go README.md

        printf 'bumped version: %s -> %s\n' "$current" "$requested"

  coverage:
    desc: Run tests and write Go coverage profile for Sonar
    cmds:
      - go test ./... -covermode=atomic -coverprofile=coverage.out

  build:
    desc: Build the envoyage binary
    run: once
    cmds:
      - go build -ldflags "-X main.version={{.VERSION}}" -o {{.BINARY}} {{.MAIN}}

  smoke:
    desc: Run a safe wrapper smoke test without invoking Docker
    deps:
      - build
    cmds:
      - |
        bin="$PWD/{{.BINARY}}"
        tmpdir="$(mktemp -d)"
        trap 'rm -rf "$tmpdir"' EXIT
        cd "$tmpdir"
        printf 'TOKEN=secret-value\n' > .env
        output="$(ENVOYAGE_DOCKER_BIN=/bin/echo "$bin" compose config)"
        test "$output" = "compose config"

  smoke:crypto:
    desc: Generate an age key, encrypt an env file, and load it through compose wrapper
    deps:
      - build
    cmds:
      - |
        bin="$PWD/{{.BINARY}}"
        tmpdir="$(mktemp -d)"
        trap 'rm -rf "$tmpdir"' EXIT
        cd "$tmpdir"
        "$bin" keygen --out age-key.txt >/dev/null
        printf 'APP_ENV=test\n' > .env
        printf 'TOKEN=secret-value\n' > .secrets.env
        AGE_IDENTITY_FILE=./age-key.txt "$bin" encrypt >/dev/null
        rm .secrets.env
        AGE_IDENTITY_FILE=./age-key.txt "$bin" decrypt >/dev/null
        output="$(AGE_IDENTITY_FILE=./age-key.txt ENVOYAGE_DOCKER_BIN=/bin/echo "$bin" compose config)"
        test "$output" = "compose config"

  smoke:install:
    desc: Install and uninstall Envoyage in a temporary user-local layout
    deps:
      - build
    cmds:
      - |
        bin="$PWD/{{.BINARY}}"
        tmpdir="$(mktemp -d)"
        trap 'rm -rf "$tmpdir"' EXIT
        "$bin" install --bin-dir "$tmpdir/bin" --lib-dir "$tmpdir/lib/envoyage" >/dev/null
        test "$("$tmpdir/bin/envoyage" version)" = "envoyage {{.VERSION}}"
        "$tmpdir/bin/envoyage" uninstall --bin-dir "$tmpdir/bin" --lib-dir "$tmpdir/lib/envoyage" >/dev/null
        test ! -e "$tmpdir/bin/envoyage"
        test ! -e "$tmpdir/lib/envoyage/envoyage"

  smoke:shim:
    desc: Run the optional runtime shim mode without invoking Docker
    deps:
      - build
    cmds:
      - |
        bin="$PWD/{{.BINARY}}"
        tmpdir="$(mktemp -d)"
        trap 'rm -rf "$tmpdir"' EXIT
        mkdir -p "$tmpdir/shim" "$tmpdir/real" "$tmpdir/app"
        ln -s "$bin" "$tmpdir/shim/docker"
        cat > "$tmpdir/real/docker" <<'EOF'
        #!/bin/sh
        printf '%s' "$*"
        EOF
        chmod 700 "$tmpdir/real/docker"
        cd "$tmpdir/app"
        printf 'TOKEN=secret-value\n' > .env
        output="$(PATH="$tmpdir/shim:$tmpdir/real:$PATH" docker compose config)"
        test "$output" = "compose config"

  scan:cve:
    desc: Scan dependencies for CVEs with Trivy and govulncheck
    cmds:
      - task: scan:cve:trivy
      - task: scan:cve:govulncheck

  scan:cve:trivy:
    desc: Scan filesystem dependencies with Trivy
    preconditions:
      - sh: command -v trivy >/dev/null 2>&1
        msg: "trivy is required. Install it from https://aquasecurity.github.io/trivy/"
    cmds:
      - trivy fs --scanners vuln --exit-code 1 --no-progress .

  scan:cve:govulncheck:
    desc: Scan Go code with govulncheck
    cmds:
      - |
        if command -v govulncheck >/dev/null 2>&1; then
          govulncheck ./...
        else
          go run golang.org/x/vuln/cmd/govulncheck@latest ./...
        fi

  sonar:
    desc: Run Sonar analysis using .env and sonar-project.properties
    deps:
      - coverage
    dotenv:
      - .env
    preconditions:
      - sh: test -f .env
        msg: ".env is required for Sonar connection settings"
      - sh: test -f sonar-project.properties
        msg: "sonar-project.properties is required"
      - sh: command -v sonar-scanner >/dev/null 2>&1
        msg: "sonar-scanner is required. Install SonarScanner CLI and make sure it is on PATH"
    cmds:
      - sonar-scanner -Dproject.settings=sonar-project.properties

  check:
    desc: Format, tidy, test, build, and smoke test
    cmds:
      - task: fmt
      - task: tidy
      - task: test
      - task: smoke
      - task: smoke:crypto
      - task: smoke:install
      - task: smoke:shim

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf {{.BINARY}} coverage.* .scannerwork
